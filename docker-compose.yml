services:  
  db:  
    image: postgres:13  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  
    environment:  
      POSTGRES_USER: postgres  
      POSTGRES_PASSWORD: password  
    ports:  
      - "5432:5432"  
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U postgres"]  
      interval: 5s  
      timeout: 5s  
      retries: 5  

  redis:  
    image: redis:alpine  
    ports:  
      - "6379:6379"  

  web:  
    build: .  
    env_file:  
      - .env  
    command: bash -c "rm -f tmp/pids/server.pid && rails db:setup && rails s -b '0.0.0.0'"  
    volumes:  
      - .:/app  
    ports:  
      - "3000:3000"  
    depends_on:  
      db:  
        condition: service_healthy  
      redis:  
        condition: service_started  
    environment:  
      DATABASE_HOST: db  
      DATABASE_PORT: 5432  
      DATABASE_USER: postgres  
      DATABASE_PASSWORD: password  
      DATABASE_NAME: blog_api_development  
      REDIS_URL: redis://redis:6379/1  

  sidekiq:  
    build: .  
    env_file:  
      - .env  
    command: bundle exec sidekiq  
    volumes:  
      - .:/app  
    depends_on:  
      db:  
        condition: service_healthy  
      redis:  
        condition: service_started  
    environment:  
      DATABASE_HOST: db  
      DATABASE_PORT: 5432  
      DATABASE_USER: postgres  
      DATABASE_PASSWORD: password  
      DATABASE_NAME: blog_api_development  
      REDIS_URL: redis://redis:6379/1  

volumes:  
  postgres_data:  